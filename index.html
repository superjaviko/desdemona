<html lang="es">

    <style>
        :root {
            --primary: #00d2ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--primary);
            margin-top: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* Contenedor Principal del Video */
        .video-container {
            position: relative; /* Importante para que el canvas se pegue aquí */
            width: 720px;
            height: 560px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin: 20px;
            background: #000;
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Panel de Control Estilo Moderno */
        .controls-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #334155;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        select:focus {
            border-color: var(--primary);
        }

        button#btnSent {
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        button#btnSent:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5);
            filter: brightness(1.1);
        }

        button#btnSent:active:not(:disabled) {
            transform: translateY(1px);
        }
