<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DETECTOR EMOTIONS</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: sans-serif; }
.container {
        position: relative; /* Clave: Define un contenedor de referencia */
        width: 720px;       /* Mismo ancho del video */
        height: 560px;      /* Misma altura del video */
    }
    video {
        position: absolute; /* Superpone el video */
        top: 0;
        left: 0;
    }
    canvas {
        position: absolute; /* Superpone el canvas transparente */
        top: 0;
        left: 0;
        z-index: 10;        /* Lo pone al frente para ver el recuadro */
    }
    </style>
</head>
<body>
    <h1>DESDEMONA: AI DETECTOR EMOTIONS</h1>
    <div class="container">
        <video id="video" width="720" height="560" autoplay muted></video>
    </div>
    <button id="btnSent" disabled>SENT (Enviar Datos)</button>
    <div id="status">Cargando modelos...</div>
</body>
</html>
